site_name: Recover From False Positive
site_description: Recover a Claude Code session when Anthropic's API output classifier false-positives on legitimate engineering work — and stop it happening again.
site_url: https://88plug.github.io/recover-from-false-positive/
repo_url: https://github.com/88plug/recover-from-false-positive
repo_name: 88plug/recover-from-false-positive
edit_uri: edit/main/docs/
use_directory_urls: true
strict: true

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - toc:
      permalink: true

nav:
  - Overview: index.md
  - Installation: installation.md
  - When it triggers: when-triggers.md
  - Scrub workflow: scrub-workflow.md
  - Troubleshooting: troubleshooting.md
